name: Unit Tests
on:
  push:
    branches:
      - '**'        # all branches (task1, task2, task3, main)
  pull_request:
    branches:
      - main        # only PRs going INTO main trigger this

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest    # GitHub-hosted Ubuntu runner

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11.4
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.4'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # Run the unit tests with pytest
      # -v           : verbose output (shows each test name)
      # --tb=short   : short traceback on failure (easier to read in CI logs)
      # --cov=src    : measure code coverage for the src/ directory
      # --cov-report : print coverage summary in the terminal
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

